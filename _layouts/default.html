<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Theme: apply saved choice before first paint to avoid a flash.
       No saved choice → leave unset so CSS follows prefers-color-scheme. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('atlas-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:title"       content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type"        content="website">
  <meta name="twitter:card"       content="summary">
  {% seo %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <!-- Parallax scene: garden (light) / space (dark). Decorative only. -->
  <div class="px" aria-hidden="true">
    <div class="px-layer px-far"  data-depth="0.05"></div>
    <div class="px-layer px-mid"  data-depth="0.12"></div>
    <div class="px-layer px-tex"  data-depth="0.07"></div>
    <div class="px-layer px-near" data-depth="0.20"></div>
  </div>

  <div class="read-progress" aria-hidden="true">
    <div class="read-progress-bar" id="progress-bar"></div>
  </div>

  <header class="site-header">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      {{ site.title | default: "Atlas" }}<span>/</span>
    </a>
    <nav class="site-nav" aria-label="Site navigation">
      <a href="{{ '/' | relative_url }}"
         {% if page.url == '/' %}class="active"{% endif %}>Home</a>
      <a href="{{ '/blogs/' | relative_url }}"
         {% if page.url contains '/blogs' %}class="active"{% endif %}>Blog</a>
      <a href="{{ '/news/' | relative_url }}"
         {% if page.url contains '/news' %}class="active"{% endif %}>News</a>

      <button type="button" class="theme-toggle" id="theme-toggle"
              role="switch" aria-checked="false" aria-label="Toggle light and dark theme"
              title="Toggle theme">
        <!-- Sun -->
        <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
        </svg>
        <!-- Moon -->
        <svg class="ic-moon" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
        </svg>
        <span class="tt-thumb" aria-hidden="true"></span>
      </button>
    </nav>
  </header>

  <main>{{ content }}</main>

  <footer class="site-footer">
    <p>{{ site.title | default: "Atlas" }} &mdash; {{ 'now' | date: "%Y" }}</p>
    <div class="footer-palette" aria-hidden="true">
      <div class="footer-dot" style="background:#F4EFE4;"></div>
      <div class="footer-dot" style="background:#7A8BAB;"></div>
      <div class="footer-dot" style="background:#3D5070;"></div>
      <div class="footer-dot" style="background:#C4856A;"></div>
      <div class="footer-dot" style="background:#0E1820;"></div>
    </div>
  </footer>

  <script>
  (function () {
    // ── Parallax (scroll depth + pointer drift) ────────────────
    var px = document.querySelector('.px');
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (px && !reduce.matches) {
      // The scene is fixed (locked) — content scrolling over it provides the
      // depth. Layers only drift gently with the pointer for a touch of life.
      var layers = Array.prototype.slice.call(px.querySelectorAll('.px-layer'));
      var mx = 0, my = 0, raf = null;

      function render() {
        raf = null;
        for (var i = 0; i < layers.length; i++) {
          var d = parseFloat(layers[i].getAttribute('data-depth')) || 0;
          var x = mx * d * 55;   // pointer drift (gentle)
          var y = my * d * 55;
          layers[i].style.transform =
            'translate3d(' + x.toFixed(2) + 'px,' + y.toFixed(2) + 'px,0)';
        }
      }
      function schedule() { if (!raf) raf = requestAnimationFrame(render); }

      if (window.matchMedia('(pointer:fine)').matches) {
        window.addEventListener('pointermove', function (e) {
          mx = (e.clientX / window.innerWidth - 0.5) * 2;
          my = (e.clientY / window.innerHeight - 0.5) * 2;
          schedule();
        }, { passive: true });
      }
      render();
    }

    // ── Theme toggle ───────────────────────────────────────────
    var toggle = document.getElementById('theme-toggle');
    if (toggle) {
      var root = document.documentElement;
      var mq = window.matchMedia('(prefers-color-scheme: dark)');

      function currentTheme() {
        var set = root.getAttribute('data-theme');
        return set ? set : (mq.matches ? 'dark' : 'light');
      }
      function syncToggle() {
        toggle.setAttribute('aria-checked', currentTheme() === 'dark' ? 'true' : 'false');
      }
      syncToggle();

      toggle.addEventListener('click', function () {
        var next = currentTheme() === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        try { localStorage.setItem('atlas-theme', next); } catch (e) {}
        syncToggle();
      });

      // If the user hasn't picked explicitly, follow OS changes live.
      mq.addEventListener('change', function () {
        try { if (!localStorage.getItem('atlas-theme')) syncToggle(); } catch (e) {}
      });
    }

    // ── Reading progress + TOC ─────────────────────────────────
    var bar = document.getElementById('progress-bar');
    if (!bar) return;
    window.addEventListener('scroll', function () {
      var doc = document.documentElement;
      var s = doc.scrollTop || document.body.scrollTop;
      var t = doc.scrollHeight - doc.clientHeight;
      bar.style.width = t > 0 ? (s / t * 100) + '%' : '0%';
    }, { passive: true });

    var article = document.getElementById('post-body');
    var tocList = document.getElementById('toc-list');
    var tocCard = document.getElementById('toc-card');
    if (!article || !tocList) return;
    var headings = article.querySelectorAll('h2, h3');
    if (headings.length < 2) { if (tocCard) tocCard.style.display = 'none'; return; }
    headings.forEach(function (h, i) {
      if (!h.id) h.id = 'section-' + i;
      var li = document.createElement('li');
      if (h.tagName === 'H3') li.classList.add('toc-h3');
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent.replace(/^§\s*/, '');
      li.appendChild(a);
      tocList.appendChild(li);
    });
    var links = tocList.querySelectorAll('a');
    var obs = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          links.forEach(function (l) { l.classList.remove('active'); });
          var a = tocList.querySelector('a[href="#' + entry.target.id + '"]');
          if (a) a.classList.add('active');
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    headings.forEach(function (h) { obs.observe(h); });
  })();
  </script>

</body>
</html>
