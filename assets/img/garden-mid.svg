<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ccb6a"/>
      <stop offset="1" stop-color="#4f9438"/>
    </linearGradient>
    <linearGradient id="lgB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#72b455"/>
      <stop offset="1" stop-color="#3d7e2d"/>
    </linearGradient>
    <!-- a leaf with a midrib + two pairs of side veins -->
    <g id="vleaf">
      <path d="M0 0 C60 40 60 160 0 230 C-60 160 -60 40 0 0Z"/>
      <path d="M0 14 L0 218" fill="none" stroke="#2f5d24" stroke-opacity="0.34" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M0 64 C20 74 30 90 36 112 M0 64 C-20 74 -30 90 -36 112" fill="none" stroke="#2f5d24" stroke-opacity="0.20" stroke-width="2.2"/>
      <path d="M0 118 C22 130 32 148 38 172 M0 118 C-22 130 -32 148 -38 172" fill="none" stroke="#2f5d24" stroke-opacity="0.17" stroke-width="2.2"/>
    </g>
  </defs>

  <!-- top-left canopy -->
  <g fill="url(#lgA)" fill-opacity="0.6">
    <use href="#vleaf" transform="translate(60 -64) rotate(24) scale(1.32)"/>
    <use href="#vleaf" transform="translate(196 -82) rotate(54) scale(1.08)"/>
    <use href="#vleaf" transform="translate(18 -36) rotate(-7) scale(0.9)"/>
    <use href="#vleaf" transform="translate(330 -104) rotate(74) scale(0.82)"/>
  </g>

  <!-- top-right canopy -->
  <g fill="url(#lgB)" fill-opacity="0.55">
    <use href="#vleaf" transform="translate(1540 -64) rotate(-24) scale(1.32)"/>
    <use href="#vleaf" transform="translate(1404 -82) rotate(-54) scale(1.08)"/>
    <use href="#vleaf" transform="translate(1582 -36) rotate(7) scale(0.9)"/>
    <use href="#vleaf" transform="translate(1270 -104) rotate(-74) scale(0.82)"/>
  </g>

  <!-- a slender hanging vine with small leaves, centre-top -->
  <g fill="url(#lgB)" fill-opacity="0.5" stroke="#3d7e2d" stroke-opacity="0.4" stroke-width="3">
    <path d="M800 -40 C 820 70 770 150 800 250 C 824 330 786 400 806 470" fill="none"/>
    <use href="#vleaf" transform="translate(800 90) rotate(120) scale(0.34)" stroke="none"/>
    <use href="#vleaf" transform="translate(800 200) rotate(-110) scale(0.32)" stroke="none"/>
    <use href="#vleaf" transform="translate(806 330) rotate(125) scale(0.3)" stroke="none"/>
  </g>
</svg>
