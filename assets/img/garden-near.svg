<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ngA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5aa23f"/>
      <stop offset="1" stop-color="#2f6a24"/>
    </linearGradient>
    <linearGradient id="ngB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#479036"/>
      <stop offset="1" stop-color="#26571d"/>
    </linearGradient>
    <g id="nleaf">
      <path d="M0 0 C60 40 60 160 0 230 C-60 160 -60 40 0 0Z"/>
      <path d="M0 14 L0 218" fill="none" stroke="#1f4417" stroke-opacity="0.4" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M0 66 C20 76 30 92 36 114 M0 66 C-20 76 -30 92 -36 114" fill="none" stroke="#1f4417" stroke-opacity="0.26" stroke-width="2.4"/>
      <path d="M0 120 C22 132 32 150 38 174 M0 120 C-22 132 -32 150 -38 174" fill="none" stroke="#1f4417" stroke-opacity="0.22" stroke-width="2.4"/>
    </g>
    <!-- small five-petal blossom -->
    <g id="bloom">
      <g fill="#e0a585" fill-opacity="0.85">
        <circle cx="0" cy="-10" r="7"/>
        <circle cx="9.5" cy="-3" r="7"/>
        <circle cx="6" cy="8.5" r="7"/>
        <circle cx="-6" cy="8.5" r="7"/>
        <circle cx="-9.5" cy="-3" r="7"/>
      </g>
      <circle cx="0" cy="0" r="4.5" fill="#f1cf8a"/>
    </g>
  </defs>

  <!-- foreground leaves rising from the bottom -->
  <g fill="url(#ngB)" fill-opacity="0.66">
    <use href="#nleaf" transform="translate(70 1020) rotate(184) scale(1.7)"/>
    <use href="#nleaf" transform="translate(280 1020) rotate(200) scale(1.25)"/>
    <use href="#nleaf" transform="translate(1540 1020) rotate(176) scale(1.7)"/>
    <use href="#nleaf" transform="translate(1330 1020) rotate(160) scale(1.25)"/>
  </g>
  <g fill="url(#ngA)" fill-opacity="0.7">
    <use href="#nleaf" transform="translate(180 1020) rotate(166) scale(1.42)"/>
    <use href="#nleaf" transform="translate(1430 1020) rotate(195) scale(1.42)"/>
    <use href="#nleaf" transform="translate(800 1024) rotate(180) scale(1.15)"/>
  </g>

  <!-- grass-blade fringe across the bottom -->
  <g fill="#2c6321" fill-opacity="0.58">
    <use href="#nleaf" transform="translate(120 1020) rotate(182) scale(0.3 1.8)"/>
    <use href="#nleaf" transform="translate(380 1020) rotate(178) scale(0.32 2.0)"/>
    <use href="#nleaf" transform="translate(600 1020) rotate(184) scale(0.28 1.7)"/>
    <use href="#nleaf" transform="translate(980 1020) rotate(177) scale(0.3 1.8)"/>
    <use href="#nleaf" transform="translate(1200 1020) rotate(183) scale(0.32 1.95)"/>
    <use href="#nleaf" transform="translate(1470 1020) rotate(179) scale(0.28 1.7)"/>
  </g>

  <!-- a few soft blossoms tucked in the foliage -->
  <g fill-opacity="0.9">
    <use href="#bloom" transform="translate(230 905) scale(1.15)"/>
    <use href="#bloom" transform="translate(1380 880) scale(1.0)"/>
    <use href="#bloom" transform="translate(120 950) scale(0.8)"/>
  </g>
</svg>
